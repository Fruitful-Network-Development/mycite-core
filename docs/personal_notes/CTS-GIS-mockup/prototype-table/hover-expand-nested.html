<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nested Hover Expand List</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --frame-w: 540px;
      --frame-h: 720px;
      --rail-w: 56px;
      --child-w: 180px;
      --panel-h: 342px;
      --pad: 14px;
      --line: #363636;
      --bg: #eeeeee;
      --panel-bg: #f6f6f6;
      --text: #303030;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    .frame {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      border: 1px solid var(--line);
      background: var(--bg);
      overflow: hidden;
    }

    .workspace {
      position: absolute;
      inset: 0;
      padding: var(--pad);
    }

    .rail {
      position: absolute;
      top: calc(var(--pad) + 10px);
      left: 8px;
      width: var(--rail-w);
      height: calc(var(--frame-h) - (var(--pad) * 2) - 20px);
      border: 1px solid var(--line);
      background: var(--panel-bg);
      overflow: hidden;
    }

    .list-item {
      width: 100%;
      border-top: 1px solid var(--line);
      background: var(--panel-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      cursor: pointer;
      overflow: hidden;
      white-space: nowrap;
      transition: background-color 120ms ease;
    }

    .list-item:first-child { border-top: 0; }
    .list-item.is-hovered { background: #f0f0f0; }
    .list-item.is-selected { background: #ebebeb; font-weight: 600; }

    .list-label {
      pointer-events: none;
      transform-origin: center center;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    .child-panel {
      position: absolute;
      width: var(--child-w);
      height: var(--panel-h);
      border: 1px solid var(--line);
      background: var(--panel-bg);
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease, transform 160ms ease;
      transform: translateX(6px);
    }

    .child-panel.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }

    .bridge {
      position: absolute;
      height: 0;
      border-top: 1px solid var(--line);
      opacity: 0;
      transition: opacity 140ms ease;
      pointer-events: none;
    }

    .bridge.visible { opacity: 1; }

    .ghost-area {
      position: absolute;
      left: calc(var(--rail-w) + 28px);
      right: 14px;
      top: 14px;
      bottom: 14px;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="workspace" id="workspace">
      <div class="rail" id="rootRail"></div>
      <div class="bridge" id="bridge"></div>
      <div class="child-panel" id="childPanel"></div>
      <div class="ghost-area"></div>
    </div>
  </div>

  <script>
    const rootRail = document.getElementById('rootRail');
    const childPanel = document.getElementById('childPanel');
    const bridge = document.getElementById('bridge');
    const workspace = document.getElementById('workspace');

    const parentItems = [];
    const childItems = [];

    const state = {
      parent: {
        labels: buildParentLabels(),
        hoverY: null,
        hoverIndex: null,
        speed: 0,
        lastY: null,
        lastT: performance.now(),
        selectedIndex: parentIndexFromLabel('M1')
      },
      child: {
        labels: [],
        hoverY: null,
        hoverIndex: null,
        speed: 0,
        lastY: null,
        lastT: performance.now(),
        selectedIndex: null
      }
    };

    function buildParentLabels() {
      const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
      const labels = [];
      for (const letter of letters) {
        for (let i = 1; i <= 9; i++) {
          labels.push(letter + i);
        }
      }
      return labels;
    }

    function parentIndexFromLabel(label) {
      return state?.parent?.labels?.indexOf(label) ?? -1;
    }

    function buildChildLabels(base) {
      const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
      return letters.map(letter => `${base}-${letter}`);
    }

    function createItems(container, labels, store) {
      container.innerHTML = '';
      store.length = 0;
      labels.forEach((label, index) => {
        const el = document.createElement('div');
        el.className = 'list-item';
        el.dataset.index = index;
        const span = document.createElement('span');
        span.className = 'list-label';
        span.textContent = label;
        el.appendChild(span);
        container.appendChild(el);
        store.push(el);
      });
    }

    function getFocusWeights(count, hoverY, rectHeight, speed, selectedIndex) {
      const minW = 0.16;
      const weights = new Array(count).fill(minW);
      const maxIndex = Math.max(1, count - 1);

      if (hoverY != null) {
        const p = (hoverY / rectHeight) * maxIndex;
        const sigma = 1.2 + Math.min(speed * 0.06, 8.0);
        for (let i = 0; i < count; i++) {
          const d = Math.abs(i - p);
          weights[i] += 2.7 / (1 + Math.pow(d / sigma, 2.25));
        }
      }

      if (selectedIndex != null && selectedIndex >= 0) {
        for (let i = 0; i < count; i++) {
          const d = Math.abs(i - selectedIndex);
          weights[i] += 3.4 / (1 + Math.pow(d / 1.35, 2.4));
        }
      }

      return weights;
    }

    function applyHeights(items, stateBlock, container, mode) {
      const rect = container.getBoundingClientRect();
      const weights = getFocusWeights(
        items.length,
        stateBlock.hoverY,
        rect.height,
        stateBlock.speed,
        stateBlock.selectedIndex
      );

      const totalWeight = weights.reduce((a, b) => a + b, 0);
      const borderLoss = items.length - 1;
      const usableHeight = rect.height - borderLoss;

      let running = 0;
      let maxSize = -Infinity;
      let maxIndex = -1;

      items.forEach((item, index) => {
        const h = Math.max(1, (weights[index] / totalWeight) * usableHeight);
        running += h;
        if (h > maxSize) {
          maxSize = h;
          maxIndex = index;
        }
        item.style.height = `${h}px`;

        const label = item.firstElementChild;
        const scale = Math.min(1.9, Math.max(0.62, 0.58 + h / (mode === 'parent' ? 58 : 44)));
        const opacity = h < 7 ? 0.35 : h < 12 ? 0.58 : 1;
        label.style.transform = `scale(${scale})`;
        label.style.opacity = opacity;

        item.classList.toggle('is-selected', index === stateBlock.selectedIndex);
      });

      stateBlock.hoverIndex = maxIndex;
    }

    function updatePointerState(block, event, container) {
      const rect = container.getBoundingClientRect();
      const y = Math.max(0, Math.min(rect.height, event.clientY - rect.top));
      const now = performance.now();
      const dt = Math.max(16, now - block.lastT);
      const dy = block.lastY == null ? 0 : Math.abs(y - block.lastY);
      const instantaneous = dy / dt;
      block.speed = block.speed * 0.7 + instantaneous * 0.3 * 100;
      block.hoverY = y;
      block.lastY = y;
      block.lastT = now;
    }

    function clearHover(block) {
      block.hoverY = null;
      block.hoverIndex = null;
      block.lastY = null;
      block.speed *= 0.4;
      block.lastT = performance.now();
    }

    function selectedParentLabel() {
      const i = state.parent.selectedIndex;
      return i == null || i < 0 ? null : state.parent.labels[i];
    }

    function positionChildPanel() {
      const selectedIndex = state.parent.selectedIndex;
      if (selectedIndex == null || selectedIndex < 0 || !parentItems[selectedIndex]) {
        childPanel.classList.remove('visible');
        bridge.classList.remove('visible');
        return;
      }

      const selectedItem = parentItems[selectedIndex];
      const railRect = rootRail.getBoundingClientRect();
      const selectedRect = selectedItem.getBoundingClientRect();
      const workspaceRect = workspace.getBoundingClientRect();

      const panelHeight = childPanel.offsetHeight || parseFloat(getComputedStyle(childPanel).height);
      const panelWidth = childPanel.offsetWidth || parseFloat(getComputedStyle(childPanel).width);
      const selectedCenterY = selectedRect.top - workspaceRect.top + selectedRect.height / 2;
      const selectedMidX = railRect.right - workspaceRect.left - 1;

      const minTop = 10;
      const maxTop = workspaceRect.height - panelHeight - 10;
      const top = Math.max(minTop, Math.min(maxTop, selectedCenterY - panelHeight / 2));
      const left = selectedMidX;

      childPanel.style.left = `${left}px`;
      childPanel.style.top = `${top}px`;
      childPanel.classList.add('visible');

      const bridgeTop = selectedRect.top - workspaceRect.top + selectedRect.height / 2;
      bridge.style.left = `${selectedMidX}px`;
      bridge.style.top = `${bridgeTop}px`;
      bridge.style.width = `${Math.max(0, panelWidth - 1)}px`;
      bridge.classList.add('visible');
    }

    function syncChildList() {
      const base = selectedParentLabel();
      if (!base) {
        state.child.labels = [];
        childPanel.innerHTML = '';
        childPanel.classList.remove('visible');
        bridge.classList.remove('visible');
        return;
      }

      const nextLabels = buildChildLabels(base);
      const changed = nextLabels.join('|') !== state.child.labels.join('|');
      if (changed) {
        state.child.labels = nextLabels;
        createItems(childPanel, state.child.labels, childItems);
        state.child.selectedIndex = state.child.selectedIndex ?? 16;
        wireChildEvents();
      }
    }

    function wireParentEvents() {
      rootRail.addEventListener('mousemove', (event) => {
        updatePointerState(state.parent, event, rootRail);
        render();
      });

      rootRail.addEventListener('mouseleave', () => {
        clearHover(state.parent);
        render();
      });

      rootRail.addEventListener('click', (event) => {
        const item = event.target.closest('.list-item');
        if (!item) return;
        state.parent.selectedIndex = Number(item.dataset.index);
        state.child.selectedIndex = null;
        state.child.hoverY = null;
        state.child.speed = 0;
        syncChildList();
        render();
      });
    }

    function wireChildEvents() {
      childPanel.onmousemove = (event) => {
        updatePointerState(state.child, event, childPanel);
        render();
      };

      childPanel.onmouseleave = () => {
        clearHover(state.child);
        render();
      };

      childPanel.onclick = (event) => {
        const item = event.target.closest('.list-item');
        if (!item) return;
        state.child.selectedIndex = Number(item.dataset.index);
        render();
      };
    }

    function markHovered(items, hoveredIndex) {
      items.forEach((item, index) => {
        item.classList.toggle('is-hovered', index === hoveredIndex);
      });
    }

    function render() {
      applyHeights(parentItems, state.parent, rootRail, 'parent');
      markHovered(parentItems, state.parent.hoverIndex);
      syncChildList();

      if (childItems.length) {
        applyHeights(childItems, state.child, childPanel, 'child');
        markHovered(childItems, state.child.hoverIndex);
        positionChildPanel();
      }
    }

    createItems(rootRail, state.parent.labels, parentItems);
    wireParentEvents();
    syncChildList();
    render();

    window.addEventListener('resize', render);
  </script>
</body>
</html>
