<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hover Expand List</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #efefef;
      font-family: Arial, Helvetica, sans-serif;
    }

    .frame {
      width: 360px;
      height: 720px;
      border: 1px solid #444;
      background: #ececec;
      padding: 18px 12px;
    }

    .layout {
      height: 100%;
      display: flex;
      align-items: stretch;
      gap: 12px;
    }

    .rail {
      width: 92px;
      border: 1px solid #444;
      background: #f2f2f2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .item {
      flex: 1 1 0;
      min-height: 0;
      border-top: 1px solid #444;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #444;
      background: #f2f2f2;
      transition:
        flex-grow 180ms ease,
        font-size 180ms ease,
        background-color 180ms ease;
    }

    .item:first-child { border-top: 0; }

    .item.active {
      flex-grow: 2.7;
      font-size: 15px;
      background: #e8e8e8;
    }

    .content {
      flex: 1;
      background: transparent;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="layout">
      <div class="rail" id="rail"></div>
      <div class="content"></div>
    </div>
  </div>

  <script>
    const rail = document.getElementById('rail');
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

    rail.innerHTML = letters.map(letter => `
      <div class="item" data-letter="${letter}">${letter}</div>
    `).join('');

    rail.addEventListener('mouseover', (e) => {
      const item = e.target.closest('.item');
      if (!item) return;
      rail.querySelector('.active')?.classList.remove('active');
      item.classList.add('active');
    });

    rail.addEventListener('mouseleave', () => {
      rail.querySelector('.active')?.classList.remove('active');
    });
  </script>
</body>
</html>
