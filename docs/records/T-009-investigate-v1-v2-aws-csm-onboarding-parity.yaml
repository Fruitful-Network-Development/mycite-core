id: T-009
title: Map V1 AWS-CMS onboarding control-plane parity against current V2 AWS seams and define onboarding task
primary_type: investigation_only
owner: lead
status: resolved
verification_result: not_required
priority: high

objective: >
  Determine exactly what is still missing between the current post-T-008 V2 AWS
  seams and the V1 AWS-CMS mailbox-onboarding control plane, then author one
  follow-on implementation task that rebuilds only the missing onboarding parity
  as V2 shell-owned workflow surfaces and orchestration rather than V1 route cloning.

authority:
  precedence:
    - MyCiteV2/docs/ontology/structural_invariants.md
    - MyCiteV2/docs/decisions/decision_record_0012_post_aws_tool_platform_stabilization.md
    - MyCiteV2/docs/plans/post_mvp_rollout/post_aws_tool_platform/read_only_and_bounded_write_patterns.md
    - MyCiteV2/docs/plans/post_mvp_rollout/post_aws_tool_platform/runtime_entrypoint_catalog.md
    - MyCiteV2/docs/plans/post_mvp_rollout/admin_first/admin_first_parity_ledger.md
    - docs/V1/modularity/contracts/aws_csm.md
  notes:
    - V1 is evidence for workflow semantics and operator requirements, not a structural template.
    - V2 onboarding parity must map into shell-owned slices, entrypoints, orchestration, and tests.
    - T-008 sandbox work is current repo state and must be treated as an existing V2 seam, not ignored.
    - Live portal exposure is out of scope for this task unless needed only for classification.

scope:
  repos:
    - mycite-core
  repo_paths:
    - docs/V1/modularity/contracts/aws_csm.md
    - docs/V1/archive/aws_cms_mailbox_profile_refactor_plan.md
    - MyCiteV1/instances/_shared/runtime/flavors/fnd/portal/api/admin_integrations.py
    - MyCiteV1/instances/_shared/runtime/flavors/fnd/portal/ui/templates/tools/aws_platform_admin_home.html
    - MyCiteV1/packages/tools/aws_csm/state_adapter/profile.py
    - MyCiteV1/tests/test_admin_integrations_aws_csm.py
    - MyCiteV2/packages/state_machine/hanus_shell/
    - MyCiteV2/instances/_shared/runtime/
    - MyCiteV2/packages/modules/
    - MyCiteV2/packages/adapters/
    - MyCiteV2/packages/sandboxes/
    - MyCiteV2/docs/contracts/shell_region_kinds.md
    - MyCiteV2/docs/plans/post_mvp_rollout/slice_registry/
    - MyCiteV2/tests/
    - tasks/T-007-investigate-aws-csm-sandbox-tool.yaml
    - reports/T-007-investigation.md
    - tasks/T-008-aws-csm-sandbox-tool.yaml
    - reports/T-008-implementation.md
    - reports/T-008-verification.md
    - tasks/
    - reports/
  live_systems: []

required_outputs:
  - A repo-grounded investigation report mapping each V1 AWS-CMS onboarding action to one of:
    existing V2 seam, new V2 onboarding entrypoint, new V2 orchestration step, or intentionally dropped behavior.
  - A parity-gap table classifying ownership by shell state, runtime/orchestration, semantic module,
    adapter, sandbox, and test coverage.
  - A recommendation stating whether the missing work is repo_only or repo_and_deploy.
  - Exactly one follow-on implementation task YAML for the repo build step.

acceptance:
  - The report distinguishes current V2 seams from remaining onboarding parity gaps.
  - The report explicitly covers at minimum:
    begin_onboarding, prepare_send_as, stage_smtp_credentials, capture_verification,
    refresh_provider_status, refresh_inbound_status, enable_inbound_capture,
    replay_verification_forward, confirm_receive_verified, and confirm_verified.
  - For each action, the report classifies it as one of:
    existing read-only seam, existing bounded-write seam, existing sandbox seam,
    new shell-visible onboarding slice, orchestration-only step, or intentionally omitted behavior.
  - The report states which behaviors should become shell-owned workflow slices versus
    internal orchestration beneath a smaller number of shell surfaces.
  - The report identifies exact repo paths likely to change in the follow-on implementation task.
  - The report states whether live deployment/exposure is a separate later task.
  - No product code is changed in this task.
  - Exactly one follow-on implementation task YAML is created.

implementation_requirements:
  - Read current repo code and tests, not archive narration alone.
  - Treat T-007/T-008 as current V2 baseline, not hypothetical future work.
  - Do not implement onboarding parity in this task.
  - Do not propose direct V1 route cloning as the default V2 solution.
  - Do classify whether each V1 action should become:
    a shell-visible slice, a shell-dispatched workflow step, an orchestration-only step,
    or a deliberately omitted compatibility behavior.
  - Do identify whether sandbox ownership is required for any onboarding steps or whether
    onboarding should remain under trusted-tenant admin runtime seams.
  - Do create the next task file with exact scope, acceptance, artifacts, execution block,
    and closure rule.

verification_requirements:
  - not_applicable

artifacts:
  implementation_report: reports/T-009-investigation.md
  verification_report: not_applicable
  next_task_file: tasks/T-010-v2-aws-csm-onboarding-workflow.yaml

execution:
  current_role: lead
  next_role: none
  requires_verifier: false
  handoff_files:
    lead_to_implementer: not_applicable
    implementer_to_verifier: not_applicable
    verifier_to_lead: not_applicable
  reports:
    implementation: reports/T-009-investigation.md
    verification: not_applicable
  repo_test_command: not_applicable
  live_check_command: not_applicable

closure_rule: >
  Lead may mark this task resolved only after reports/T-009-investigation.md
  exists and tasks/T-010-v2-aws-csm-onboarding-workflow.yaml has been created.