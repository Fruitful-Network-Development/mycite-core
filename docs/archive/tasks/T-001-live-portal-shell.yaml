id: T-001
slug: live-portal-shell-delivery
version: 1
status: ready
priority: critical
owner: lead
primary_type: repo_and_deploy
summary: >-
  Close the V2 portal shell issue all the way through live deployment. The task is not
  resolved until the live portal serves the current V2 template markers, current static
  assets, and passes static-bundle health checks.

context:
  why_this_exists:
    - Prior portal work repeatedly converged in repo state while remaining unresolved on the live host.
    - Tests passing and archive notes proved insufficient to close the issue.
    - The portal must be judged by repo truth, deploy truth, and live truth separately.
  current_known_signals:
    - Current repo contains V2 shell-composition markers, deep-linking, and static bundle health checks.
    - Current srv-infra repo state may still lag the intended V2 upstream routing.
    - The live portal has previously appeared as an unstyled fallback-like page.

authorities:
  constraints_file: agent/constraints.md
  repo_authorities:
    - MyCiteV2/docs/ontology/structural_invariants.md
    - MyCiteV2/docs/ontology/interface_surfaces.md
    - MyCiteV2/docs/plans/authority_stack.md
    - MyCiteV2/docs/audits/v2_shell_visual_parity_and_standards_audit_2026-04-10.md
  implementation_paths:
    - MyCiteV2/instances/_shared/portal_host/app.py
    - MyCiteV2/instances/_shared/portal_host/templates/portal.html
    - MyCiteV2/instances/_shared/portal_host/static/v2_portal_shell.js
    - MyCiteV2/instances/_shared/runtime/admin_runtime.py
    - MyCiteV2/tests/integration/test_v2_native_portal_host.py
    - MyCiteV2/tests/architecture/test_v2_native_portal_host_boundaries.py
    - nginx/sites-available/portal.fruitfulnetworkdevelopment.com.conf

acceptance:
  repo:
    - portal.html contains the V2 shell template marker comment
    - portal.html exposes build marker text in the rendered shell footer or marker area
    - app.py exposes portal_static_bundle health information
    - app.py bootstraps deep-link slugs to the intended slice IDs
    - v2_portal_shell.js does not contain fallback catalog nav
  deploy:
    - actual host nginx config for portal.fruitfulnetworkdevelopment.com is inspected
    - actual running portal service or unit is inspected
    - if live mismatch is caused by stale deploy or wrong upstream, it is corrected
  live:
    - GET /portal/system returns HTML containing shell-template marker
    - GET /portal/system returns HTML containing build marker text or build marker comment
    - GET /portal/static/portal.css returns HTTP 200
    - GET /portal/static/v2_portal_shell.js returns HTTP 200
    - GET /healthz returns portal_static_bundle.static_ok == true
    - the live portal no longer presents as the unstyled fallback/status page

required_commands:
  repo_checks:
    - >-
      cd /srv/repo/mycite-core && grep -n "PORTAL_BUILD_ID\|URL_SLUG_TO_SLICE_ID\|portal_static_bundle\|shell-template: v2-composition\|build:" MyCiteV2/instances/_shared/portal_host/app.py MyCiteV2/instances/_shared/portal_host/templates/portal.html
    - >-
      cd /srv/repo/mycite-core && PYTHONPATH=/srv/repo/mycite-core /srv/venvs/fnd_portal/bin/python3 -m pytest MyCiteV2/tests
  live_checks:
    - >-
      cd /tmp && curl -s https://portal.fruitfulnetworkdevelopment.com/portal/system | grep -n "shell-template: v2-composition\|build:"
    - >-
      cd /tmp && curl -I https://portal.fruitfulnetworkdevelopment.com/portal/static/portal.css
    - >-
      cd /tmp && curl -I https://portal.fruitfulnetworkdevelopment.com/portal/static/v2_portal_shell.js
    - >-
      cd /tmp && curl -s https://portal.fruitfulnetworkdevelopment.com/healthz | python3 -m json.tool
  host_checks:
    - inspect actual nginx config loaded on the live host
    - inspect active service or unit serving the portal host
    - inspect deployed build or revision identifier when available

reporting:
  implementation_report: reports/T-001-implementation.md
  verification_report: reports/T-001-verification.md
  required_sections:
    - Repo findings
    - Changes made
    - Tests run
    - Deploy findings
    - Live evidence
    - Final verdict

closure_rule: >-
  This task must not be marked resolved from repo diffs alone or from tests alone.
  It is resolved only when live evidence satisfies all acceptance items.

failure_modes_to_watch:
  - repo fixed but live host still serving an older revision
  - nginx still routing /portal or /portal/static to the wrong upstream
  - correct HTML served but CSS asset missing or not applied
  - health endpoint inconsistent with actual static bundle state
  - archive notes claiming fixes not reflected in current repo or live host

delegation_plan:
  lead:
    responsibilities:
      - classify the task as repo_and_deploy
      - decide whether implementer has host access
      - require independent verification before closure
  implementer:
    responsibilities:
      - fix remaining repo or host issues
      - record exact commands and outputs
      - stop if host access is unavailable
  verifier:
    responsibilities:
      - independently run live and host checks
      - return verified fixed or not verified fixed
