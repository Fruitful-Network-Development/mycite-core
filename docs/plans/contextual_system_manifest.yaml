  canonical_task_board: "docs/plans/contextual_system_task_board.yaml"
  delegation_protocol:
    version: "1.0"
    objective: "Allow a reusable single prompt to advance next actionable work and revisit injected findings."
    task_status_order:
      - "in_progress"
      - "pending"
      - "blocked"
    selection_rules:
      - "Pick exactly one next task from active streams using priority order p0 > p1 > p2 > p3."
      - "When multiple tasks tie on priority, choose the earliest stable task id lexicographically."
      - "If selected task is blocked, execute unblock taskization before feature execution."
    revisit_injection_rules:
      - "New findings create new stable task IDs; never reuse completed IDs."
      - "Injected revisit tasks must reference the originating initiative/stream and evidence report path."
      - "After injection, sync compatibility surfaces in the same change."
  compatibility_surfaces:
    - "docs/plans/planning_audit_manifest.yaml"
    - "docs/plans/planning_task_board.yaml"

