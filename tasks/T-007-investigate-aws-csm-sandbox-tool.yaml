id: T-007
title: Investigate missing AWS-CSM sandbox tool surface and define implementation task
primary_type: investigation_only
owner: lead
status: resolved
verification_result: not_required
priority: high

objective: >
  Determine exactly what is missing between the current AWS read-only /
  bounded-write tool platform pieces and a usable AWS-CSM sandbox-facing
  interface/workflow, then author the next implementation task YAML.

scope:
  repos:
    - mycite-core
  repo_paths:
    - MyCiteV2/docs/plans/post_mvp_rollout/post_aws_tool_platform/read_only_and_bounded_write_patterns.md
    - MyCiteV2/instances/_shared/runtime/
    - MyCiteV2/packages/state_machine/hanus_shell/
    - MyCiteV2/packages/modules/
    - MyCiteV2/packages/adapters/
    - MyCiteV2/tests/
    - MyCiteV2/docs/
    - tasks/
    - reports/
  live_systems: []

required_outputs:
  - A repo-grounded investigation report describing what already exists.
  - A gap analysis describing what is still missing for AWS-CSM sandbox workflow use.
  - One new follow-on task YAML for implementation.

acceptance:
  - The report distinguishes existing seams from missing seams.
  - The report states whether the missing work is repo_only or repo_and_deploy.
  - The report identifies the exact repo paths likely to change.
  - The report creates exactly one follow-on implementation task YAML.
  - No product code is changed in this task.

implementation_requirements:
  - Read current repo state, not archive narration alone.
  - Do not implement the AWS-CSM tool in this task.
  - Do create the next task file with exact scope, artifacts, execution block, and closure rule.

verification_requirements:
  - not_applicable

artifacts:
  implementation_report: reports/T-007-investigation.md
  verification_report: not_applicable
  next_task_file: tasks/T-008-aws-csm-sandbox-tool.yaml

execution:
  current_role: lead
  next_role: none
  requires_verifier: false
  handoff_files:
    lead_to_implementer: not_applicable
    implementer_to_verifier: not_applicable
    verifier_to_lead: not_applicable
  reports:
    implementation: reports/T-007-investigation.md
    verification: not_applicable
  repo_test_command: not_applicable
  live_check_command: not_applicable

closure_rule: >
  Lead may mark this task resolved only after reports/T-007-investigation.md
  exists and tasks/T-008-aws-csm-sandbox-tool.yaml has been created.