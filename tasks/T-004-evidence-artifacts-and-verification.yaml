id: T-004
title: Standardize implementation and verification evidence artifacts
primary_type: repo_only
owner: lead
status: proposed
priority: high
objective: >
  Make implementation evidence and verification evidence first-class task
  artifacts so repo-plus-deploy work cannot be closed from narrative claims
  alone.
authority:
  precedence:
    - MyCiteV2/docs/ontology/structural_invariants.md
    - MyCiteV2/docs/plans/authority_stack.md
  notes:
    - Prompt history is not authoritative.
    - Evidence must be explicit when live behavior is an acceptance criterion.
scope:
  repos:
    - mycite-core
  repo_paths:
    - agent/constraints.md
    - agent/lead.md
    - agent/implementer.md
    - agent/verifier.md
    - tasks/
    - reports/
required_outputs:
  - Reusable implementation report template.
  - Reusable verification report template.
  - Task YAML conventions for artifact paths and closure semantics.
  - A short process note for when verifier evidence is mandatory.
acceptance:
  - A standard implementation report template exists.
  - A standard verification report template exists.
  - Templates distinguish repo state, host state, and live HTTP evidence.
  - Agent role docs or constraints clearly state that verifier evidence is mandatory for live-behavior tasks.
  - At least one example task file references both implementation and verification artifact paths.
implementation_requirements:
  - Keep templates short and operational.
  - Favor exact command output blocks over prose summaries.
  - Include a final verdict field in the verification template.
verification_requirements:
  - Verifier must inspect the templates and confirm they enforce role separation.
  - Verifier must confirm the templates can support repo_only and repo_and_deploy tasks.
artifacts:
  implementation_report: reports/T-004-implementation.md
  verification_report: reports/T-004-verification.md
  template_paths:
    - reports/templates/implementation_report_template.md
    - reports/templates/verification_report_template.md
lead_handoff:
  implementer:
    focus: add templates and wire task/agent references
  verifier:
    focus: ensure templates prevent self-certification and weak closure
closure_rule: >
  Lead may close only when verifier confirms the templates enforce
  implementation-versus-verification separation.
