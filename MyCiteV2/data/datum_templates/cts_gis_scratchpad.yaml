template_id: cts_gis_scratchpad
schema: mycite.v2.datum.cts_gis.scratchpad.v1
sandbox: cts_gis
archetype: cts_gis_scratchpad_row
description: >
  Baseline scratchpad template for the cts_gis sandbox. Materialises the
  four standard header rows (schema, sandbox, msn_id, updated_at) and no
  repeating archetype — the operator authors free-form datums via the
  workbench Datum Composer (tuple mode or reference-list/group-0 mode)
  once the document is scaffolded.

  Use this when authoring ad-hoc geographic notes, intermediate
  derivations, or scratch records adjacent to the CTS-GIS tool's
  read-only source data. The CtsGisReadOnlyService remains unchanged
  for the underlying GIS source layer; scratchpad documents are
  separate operator-authored content.

# Header rows (layer 0). Sandbox-bound metadata stamped once at scaffold
# time so every materialised document carries an audit trail.
header_rows:
  - address: "0-0-1"
    field: schema
    raw: "mycite.v2.datum.cts_gis.scratchpad.v1"
  - address: "0-0-2"
    field: sandbox
    raw: "cts_gis"
  - address: "0-0-3"
    field: msn_id
    raw: "{{msn_id}}"
  - address: "0-0-4"
    field: updated_at
    raw: "{{updated_at}}"

# No repeating_archetype: the cts_gis scratchpad does not enforce a
# value-group reference design. Datums authored via the workbench
# Datum Composer can use any address shape and any magnitude or label
# payload the operator needs.
