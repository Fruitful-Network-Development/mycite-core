name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        # Pinned to match requirements-dev.txt so local == CI (no rule drift).
        run: pip install "ruff==0.15.13"
      - name: Run ruff
        run: ruff check MyCiteV2/

  no_disk_datum_docs:
    # MOS authority enforcement gate. Per
    # docs/contracts/mos_authority_enforcement.md, datum-document JSON/sqlite
    # files must not be added under webapps/mycite/fnd/data/{system,sandbox,
    # payloads/cache}/ or as parallel *.sqlite3 outside private/.
    # Compiled UI surface payloads under data/payloads/compiled/ are exempt.
    name: no on-disk datum documents
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for forbidden disk datum-doc additions
        run: |
          set -e
          BASE="${{ github.event.pull_request.base.sha || 'origin/main' }}"
          ADDED=$(git diff --name-only --diff-filter=AM "$BASE"...HEAD || true)
          VIOLATIONS=$(echo "$ADDED" | grep -E '^webapps/mycite/fnd/(data/(system|sandbox|payloads/cache)/.*\.(json|bin|pre-repair|pre-compile.*)|(?!private/).*\.sqlite3)$' || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Datum documents must live in MOS, not on disk. See docs/contracts/mos_authority_enforcement.md."
            echo "Forbidden additions:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "OK: no forbidden disk datum-doc additions."

  pytest:
    name: pytest (unit + integration + architecture)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install avifenc (resource-upload AVIF conversion)
        # libavif-bin provides /usr/bin/avifenc, used by the portal upload route
        # to convert raster uploads to AVIF (the prod host has it installed).
        run: sudo apt-get update && sudo apt-get install -y libavif-bin

      - name: Run pytest (no smoke, no e2e)
        # Excludes tests/smoke/ and tests/e2e/ — both need a real browser and run
        # in the smoke job below with playwright + chromium.
        run: pytest MyCiteV2/tests/ --ignore=MyCiteV2/tests/smoke --ignore=MyCiteV2/tests/e2e -v

  smoke:
    name: browser smoke (playwright + chromium-headless-shell)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Don't block PRs if smoke is flaky for non-code reasons; just report.
    # Flip to required once stable for ≥10 runs.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install chromium-headless-shell
        # Only the headless variant — full chromium isn't needed.
        run: playwright install chromium-headless-shell

      - name: Run browser smoke + e2e
        run: pytest MyCiteV2/tests/smoke/ MyCiteV2/tests/e2e/ -v
